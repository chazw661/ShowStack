<div id="help-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:none;align-items:center;justify-content:center;">
  <div id="help-modal" style="background:#1e1e2e;border:1px solid #2e2e4e;border-radius:10px;width:780px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;">

    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #2e2e4e;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;color:#888;">You are on:</span>
        <select id="help-module-select" onchange="helpSwitchModule(this.value)"
          style="background:#2a2a3e;border:1px solid #3e3e5e;border-radius:6px;color:#ccc;font-size:13px;padding:4px 8px;cursor:pointer;">
          <option value="mic">Mic Tracker</option>
          <option value="comm-config">COMM Config</option>
          <option value="comm-belt">COMM Belt Pack</option>
          <option value="amp">Amplifier Assignments</option>
          <option value="cable">PA Cable Schedule</option>
          <option value="soundvision">Soundvision</option>
          <option value="checklist">Audio Checklist</option>
          <option value="ip">IP Management</option>
          <option value="report">System Report</option>
        </select>
      </div>
      <button onclick="helpClose()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px;">&#x2715;</button>
    </div>

    <div style="display:flex;flex:1;min-height:0;">

      <div id="help-fn-list" style="width:200px;flex-shrink:0;border-right:1px solid #2e2e4e;padding:10px 0;overflow-y:auto;background:#181828;"></div>

      <div id="help-steps-pane" style="flex:1;padding:20px 24px;overflow-y:auto;"></div>

    </div>
  </div>
</div>

<style>
.help-fn-item {
  padding: 8px 14px;
  font-size: 12px;
  color: #999;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s;
}
.help-fn-item:hover { background: #1e1e2e; color: #ccc; }
.help-fn-item.active { background: #1e1e2e; color: #4a9eff; font-weight: 500; border-left-color: #4a9eff; }
.help-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
.help-step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: #1a3a5e; color: #4a9eff;
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.help-step-text { font-size: 13px; color: #ccc; line-height: 1.55; }
.help-step-text em { font-style: normal; font-weight: 500; color: #e0e0e0; }
.help-tip {
  margin-top: 14px; padding: 10px 12px;
  background: #1a1a2e; border-radius: 6px;
  border: 1px solid #2e2e4e;
  font-size: 11px; color: #888; line-height: 1.5;
}
.help-tip strong { color: #aaa; }
</style>

let helpCurrentModule = '{{ help_module|default:"mic" }}';
let helpCurrentFn = 0;

function helpRenderFnList() {
  const fns = HELP_DATA[helpCurrentModule].fns;
  document.getElementById('help-fn-list').innerHTML =
    '<div style="font-size:10px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.06em;padding:0 14px 8px;">Functions</div>' +
    fns.map((f, i) =>
      `<div class="help-fn-item${i === helpCurrentFn ? ' active' : ''}" onclick="helpSelectFn(${i})">${f.name}</div>`
    ).join('');
}

function helpRenderSteps() {
  const fn = HELP_DATA[helpCurrentModule].fns[helpCurrentFn];
  document.getElementById('help-steps-pane').innerHTML =
    `<div style="font-size:14px;font-weight:500;color:#e0e0e0;margin-bottom:4px;">${fn.name}</div>` +
    `<div style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.5;">${fn.desc}</div>` +
    fn.steps.map((s, i) =>
      `<div class="help-step"><div class="help-step-num">${i+1}</div><div class="help-step-text">${s}</div></div>`
    ).join('') +
    (fn.tip ? `<div class="help-tip"><strong>Tip: </strong>${fn.tip}</div>` : '');
}

function helpSelectFn(i) {
  helpCurrentFn = i;
  helpRenderFnList();
  helpRenderSteps();
}

function helpSwitchModule(mod) {
  helpCurrentModule = mod;
  helpCurrentFn = 0;
  helpRenderFnList();
  helpRenderSteps();
}

function helpOpen() {
  helpCurrentFn = 0;
  document.getElementById('help-module-select').value = helpCurrentModule;
  helpRenderFnList();
  helpRenderSteps();
  document.getElementById('help-overlay').style.display = 'flex';
}

function helpClose() {
  document.getElementById('help-overlay').style.display = 'none';
}

document.getElementById('help-overlay').addEventListener('click', function(e) {
  if (e.target === this) helpClose();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') helpClose();
});
</script>
