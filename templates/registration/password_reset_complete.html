{% extends 'marketing/base_marketing.html' %}
{% load static %}

{% block title %}Password updated - ShowStack{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <a href="{% url 'marketing:home' %}" class="auth-logo">
                    <span class="brand-icon">S</span>
                </a>
                <h1>Password updated</h1>
                <p>Your ShowStack password has been changed. You can log in now with the new password.</p>
            </div>

            <a href="{% url 'marketing:login' %}" class="btn btn-primary btn-full btn-lg" style="text-decoration:none;text-align:center;">Log in</a>
        </div>
    </div>
</section>
{% endblock %}
